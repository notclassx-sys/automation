name: Lead Gen & Email Bot

on:
  schedule:
    # Runs at the top of every hour and at the 30-minute mark
    - cron: '30 * * * *'
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from Github UI

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Sync and Run Bot
      env:
        GROQ_KEYS: ${{ secrets.GROQ_KEYS }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        # Configure Git
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Pull latest state
        git pull origin main --rebase || echo "Already up to date or conflict handled."
        
        # Run the bot
        python main.py
      
    - name: Commit and push changes
      run: |
        git add leads.json
        if ! git diff --staged --quiet; then
          git commit -m "Bot heartbeat: Leads db updated [skip ci]"
          for i in {1..5}; do
            git pull origin main --rebase && git push origin main && break || sleep 10
          done
        else
          echo "No changes found (unexpected but possible)."
        fi
